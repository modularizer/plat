<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi-Server Worker</title>
    <style>
      :root {
        --bg: #08111a;
        --bg-2: #0d1a29;
        --panel: rgba(11, 20, 32, 0.86);
        --ink: #e8f0ff;
        --muted: #8da8c3;
        --accent: #4bd3aa;
        --accent-2: #ff9d5c;
        --border: rgba(141, 168, 195, 0.18);
        --shadow: 0 22px 54px rgba(0, 0, 0, 0.34);
        --mono: "SFMono-Regular", "Menlo", "Consolas", monospace;
        --sans: "Avenir Next", "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(75, 211, 170, 0.14), transparent 24%),
          radial-gradient(circle at bottom right, rgba(255, 157, 92, 0.11), transparent 22%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
        min-height: 100vh;
        padding: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        padding: 20px;
        margin-bottom: 16px;
      }
      h1 { margin: 0 0 4px; font-size: 1.6rem; }
      h2 { margin: 0 0 12px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
      p { margin: 0; color: var(--muted); font-size: 0.9rem; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
      label { color: var(--muted); font-size: 0.85rem; }
      input, select {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: rgba(9, 17, 27, 0.96);
        color: var(--ink);
        font: inherit;
        font-size: 0.85rem;
      }
      input[type=number] { width: 70px; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 9px 16px;
        background: var(--accent);
        color: #06231b;
        font-weight: 700;
        cursor: pointer;
        font: inherit;
        font-size: 0.85rem;
      }
      button.secondary { background: rgba(141, 168, 195, 0.14); color: var(--ink); }
      button.danger { background: var(--accent-2); color: #1a0a04; }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }
      .stat {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255,255,255,0.03);
      }
      .stat strong { display: block; font-size: 1.2rem; }
      .stat small { color: var(--muted); font-size: 0.75rem; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        font-size: 0.85rem;
      }
      .dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: #b17d2a;
      }
      .dot.live { background: var(--accent); }
      .dot.draining { background: var(--accent-2); }
      .console {
        min-height: 180px;
        max-height: 280px;
        overflow: auto;
        padding: 12px;
        border-radius: 12px;
        background: #050c14;
        color: #d6ece8;
        font-family: var(--mono);
        font-size: 11px;
        white-space: pre-wrap;
        margin-top: 10px;
      }
      .id-display {
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--accent);
        word-break: break-all;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@modularizer/plat/client-server": "../../dist/client-server-entry.js",
          "mqtt": "https://esm.sh/mqtt@5.15.1?bundle",
          "typescript": "https://esm.sh/typescript@5.8.3",
          "zod": "https://esm.sh/zod@3.23.8"
        }
      }
    </script>
  </head>
  <body>
    <div class="panel">
      <h1>Server Instance</h1>
      <p>Open many copies of this page. Each tab is a separate server claiming the same name.</p>
      <div class="row">
        <label>Name: <input id="serverName" value="multi-demo" /></label>
        <label>Weight: <input id="weight" type="number" min="0" max="5" value="3" /></label>
        <label>Max Clients: <input id="maxClients" type="number" min="1" max="100" value="10" /></label>
        <button id="startBtn">Start</button>
        <button class="secondary" id="stopBtn">Stop</button>
        <button class="danger" id="drainBtn">Drain</button>
      </div>
      <div class="row">
        <span class="badge"><span class="dot" id="statusDot"></span><span id="statusLabel">Idle</span></span>
      </div>
    </div>

    <div class="panel">
      <h2>Instance Info</h2>
      <div class="stats">
        <div class="stat"><strong id="instanceId">-</strong><small>Instance ID</small></div>
        <div class="stat"><strong id="connUrl">-</strong><small>Connection URL</small></div>
        <div class="stat"><strong id="clientCount">0</strong><small>Connected Clients</small></div>
        <div class="stat"><strong id="requestCount">0</strong><small>Requests Handled</small></div>
        <div class="stat"><strong id="weightDisplay">3</strong><small>Weight</small></div>
        <div class="stat"><strong id="fingerprint">-</strong><small>Key Fingerprint</small></div>
      </div>
    </div>

    <div class="panel">
      <h2>Log</h2>
      <div class="console" id="log"></div>
    </div>

    <script type="module">
      import {
        runClientSideServer,
        DEFAULT_CLIENT_SIDE_SERVER_MQTT_BROKER,
      } from '@modularizer/plat/client-server'

      const logEl = document.getElementById('log')
      const statusDot = document.getElementById('statusDot')
      const statusLabel = document.getElementById('statusLabel')
      let runtime = null
      let reqCount = 0

      function log(msg) {
        const ts = new Date().toLocaleTimeString()
        logEl.textContent += `[${ts}] ${msg}\n`
        logEl.scrollTop = logEl.scrollHeight
      }

      function setStatus(label, dot) {
        statusLabel.textContent = label
        statusDot.className = 'dot'
        if (dot) statusDot.classList.add(dot)
      }

      const serverSource = `
import { serveClientSideServer } from '@modularizer/plat/client-server'

class MultiDemoApi {
  /** Echo a message back, tagged with the server instance. */
  async echo({ message }: { message: string }, ctx: any) {
    return {
      message,
      server: globalThis.__MULTI_SERVER_INSTANCE_ID || 'unknown',
      timestamp: Date.now(),
    }
  }

  /** Simulate work that takes some time. */
  async work({ durationMs }: { durationMs: number }, ctx: any) {
    const start = Date.now()
    for (let i = 0; i <= 10; i++) {
      await ctx.call?.progress({ step: i, of: 10, server: globalThis.__MULTI_SERVER_INSTANCE_ID })
      await new Promise(r => setTimeout(r, (durationMs || 1000) / 10))
    }
    return {
      elapsed: Date.now() - start,
      server: globalThis.__MULTI_SERVER_INSTANCE_ID || 'unknown',
    }
  }

  /** Return server health info. */
  async health() {
    return {
      server: globalThis.__MULTI_SERVER_INSTANCE_ID || 'unknown',
      uptime: Date.now() - globalThis.__MULTI_SERVER_START_TIME,
      ok: true,
    }
  }
}

export default serveClientSideServer('__SERVER_NAME__', [MultiDemoApi])
`

      document.getElementById('startBtn').addEventListener('click', start)
      document.getElementById('stopBtn').addEventListener('click', stop)
      document.getElementById('drainBtn').addEventListener('click', drain)

      async function start() {
        await stop()
        const name = document.getElementById('serverName').value.trim() || 'multi-demo'
        const weight = Number(document.getElementById('weight').value) || 3
        const maxClients = Number(document.getElementById('maxClients').value) || 10

        const source = serverSource.replace('__SERVER_NAME__', name)
        log(`Starting server "${name}" (weight=${weight}, maxClients=${maxClients})...`)

        try {
          runtime = await runClientSideServer(source, {
            workerInfo: {
              weight,
              maxClientsPerInstance: maxClients,
              acceptingNewClients: true,
            },
            onRequest(direction, payload) {
              if (direction === 'request') {
                reqCount++
                document.getElementById('requestCount').textContent = reqCount
              }
              log(`${direction === 'request' ? 'REQ' : 'RES'}  ${JSON.stringify(payload).slice(0, 200)}`)
            },
          })

          // Expose instance ID to the server code
          globalThis.__MULTI_SERVER_INSTANCE_ID = runtime.signaler.serverInstanceId
          globalThis.__MULTI_SERVER_START_TIME = Date.now()

          document.getElementById('instanceId').textContent = runtime.signaler.serverInstanceId.split(':').pop().slice(0, 12)
          document.getElementById('connUrl').textContent = runtime.connectionUrl
          document.getElementById('weightDisplay').textContent = weight
          document.getElementById('fingerprint').textContent = '(see console)'

          setStatus('Live', 'live')
          log(`Server live at ${runtime.connectionUrl}`)
          log(`Instance: ${runtime.signaler.serverInstanceId}`)
          log(`Paths: ${Object.keys(runtime.openapi.paths).join(', ')}`)
        } catch (err) {
          setStatus('Failed')
          log(`ERROR: ${err.message || err}`)
        }
      }

      async function stop() {
        if (runtime) {
          await runtime.stop()
          runtime = null
          reqCount = 0
          document.getElementById('requestCount').textContent = '0'
          document.getElementById('clientCount').textContent = '0'
        }
        setStatus('Idle')
        log('Server stopped.')
      }

      async function drain() {
        if (!runtime) return
        log('Draining...')
        setStatus('Draining', 'draining')
        try {
          await runtime.signaler.drain()
          log('Drain signal sent.')
        } catch (err) {
          log(`Drain error: ${err.message || err}`)
        }
      }

      // Auto-start
      start()
    </script>
  </body>
</html>
